name: Deploy GitHub Pages (frontend)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages site directory
        env:
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -a frontend/. _site/

          if [ -n "${PUBLIC_API_BASE:-}" ]; then
            cat > _site/config.js <<EOF
            // Auto-generated by GitHub Actions.
            // Optional: only needed if you host the UI separately from the API.
            window.__API_BASE__ = "${PUBLIC_API_BASE}";
            EOF
          else
            cat > _site/config.js <<'EOF'
            // Auto-generated by GitHub Actions.
            // Browser-only mode: analysis runs locally in the page (no backend required).
            window.__API_BASE__ = "";
            EOF
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
