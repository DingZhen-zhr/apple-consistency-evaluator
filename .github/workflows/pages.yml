name: Deploy GitHub Pages (frontend)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write runtime API base for static hosting
        env:
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
        run: |
          set -euo pipefail
          if [ -z "${PUBLIC_API_BASE:-}" ]; then
            echo "Missing GitHub repo variable PUBLIC_API_BASE (example: https://your-service.onrender.com)" >&2
            exit 1
          fi
          cat > frontend/config.js <<EOF
          // Auto-generated by GitHub Actions. Do not commit secrets here.
          window.__API_BASE__ = "${PUBLIC_API_BASE}";
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
