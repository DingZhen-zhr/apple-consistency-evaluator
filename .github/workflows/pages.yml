name: Deploy GitHub Pages (frontend)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages site directory
        env:
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
        run: |
          set -euo pipefail
          rm -rf _site
          python - <<'PY'
          import os, shutil, pathlib
          import json

          src = pathlib.Path("frontend")
          dst = pathlib.Path("_site")
          if dst.exists():
              shutil.rmtree(dst)
          shutil.copytree(src, dst)

          # Optional: also include repo-root `photos/` if the user keeps screenshots there.
          root_photos = pathlib.Path("photos")
          if root_photos.exists() and root_photos.is_dir():
              shutil.copytree(root_photos, dst / "photos", dirs_exist_ok=True)

          # Generate `photos/manifest.json` for static runtime loading.
          photos_dir = dst / "photos"
          images = []
          if photos_dir.exists():
              for p in photos_dir.rglob("*"):
                  if not p.is_file():
                      continue
                  if p.suffix.lower() not in [".png", ".jpg", ".jpeg", ".webp"]:
                      continue
                  rel = p.relative_to(dst).as_posix()
                  images.append(rel)
          images.sort()
          (photos_dir).mkdir(parents=True, exist_ok=True)
          (photos_dir / "manifest.json").write_text(json.dumps({"images": images}, ensure_ascii=False, indent=2), encoding="utf-8")

          public_api_base = os.environ.get("PUBLIC_API_BASE", "").strip()
          if public_api_base:
              text = (
                  "// Auto-generated by GitHub Actions.\n"
                  "// Optional: only needed if you host the UI separately from the API.\n"
                  f'window.__API_BASE__ = "{public_api_base}";\n'
              )
          else:
              text = (
                  "// Auto-generated by GitHub Actions.\n"
                  "// Browser-only mode: analysis runs locally in the page (no backend required).\n"
                  'window.__API_BASE__ = "";\n'
              )
          (dst / "config.js").write_text(text, encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
