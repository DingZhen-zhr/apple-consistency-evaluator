name: Deploy GitHub Pages (frontend)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Pages site directory
        env:
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
        run: |
          set -euo pipefail
          rm -rf _site
          python - <<'PY'
          import os, shutil, pathlib

          src = pathlib.Path("frontend")
          dst = pathlib.Path("_site")
          if dst.exists():
              shutil.rmtree(dst)
          shutil.copytree(src, dst)

          public_api_base = os.environ.get("PUBLIC_API_BASE", "").strip()
          if public_api_base:
              text = (
                  "// Auto-generated by GitHub Actions.\n"
                  "// Optional: only needed if you host the UI separately from the API.\n"
                  f'window.__API_BASE__ = "{public_api_base}";\n'
              )
          else:
              text = (
                  "// Auto-generated by GitHub Actions.\n"
                  "// Browser-only mode: analysis runs locally in the page (no backend required).\n"
                  'window.__API_BASE__ = "";\n'
              )
          (dst / "config.js").write_text(text, encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
