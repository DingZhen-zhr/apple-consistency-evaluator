services:
  - type: web
    name: apple-consistency-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      # Optional: restrict CORS to your GitHub Pages origin (recommended once you know the URL)
      # - key: CORS_ALLOW_ORIGINS
      #   value: https://dingzhen-zhr.github.io
